name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  # workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Build, Test, and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: apiquest-ui/yarn.lock

      - name: Install dependencies
        working-directory: apiquest-ui
        run: yarn install --immutable

      - name: Build all packages
        working-directory: apiquest-ui
        run: yarn build

      - name: Run linter
        working-directory: apiquest-ui
        run: yarn lint

      - name: Type check
        working-directory: apiquest-ui
        run: yarn typecheck

  publish:
    name: Publish Packages
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: apiquest-ui/yarn.lock
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Verify npm version
        run: npm --version

      - name: Install dependencies
        working-directory: apiquest-ui
        run: yarn install --immutable

      - name: Build all packages
        working-directory: apiquest-ui
        run: yarn build

      - name: Publish packages (skip already-published versions)
        working-directory: apiquest-ui
        run: |
          set -euo pipefail

          publish_if_needed() {
            local package_dir="$1"
            local package_name="$2"
            local package_version

            package_version=$(node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('${package_dir}/package.json','utf8'));process.stdout.write(p.version);")

            echo "Checking ${package_name}@${package_version}"

            if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
              echo "Skipping ${package_name}@${package_version} (already exists on npm)"
            else
              echo "Publishing ${package_name}@${package_version}"
              (
                cd "${package_dir}"
                npm publish --provenance --access public
              )
            fi
          }

          publish_if_needed "packages/plugin-ui-types" "@apiquest/plugin-ui-types"
          publish_if_needed "packages/plugin-http-ui" "@apiquest/plugin-http-ui"
          publish_if_needed "packages/plugin-auth-ui" "@apiquest/plugin-auth-ui"
          publish_if_needed "packages/plugin-sse-ui" "@apiquest/plugin-sse-ui"
